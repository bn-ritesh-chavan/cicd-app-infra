name: Terraform Reusable Workflow

on:
  workflow_call:
    inputs:
      trigger_repo:
        required: false
        type: string
    secrets:
      TF_API_TOKEN:
        required: true
      APP_REPO_PAT:
        required: true
        
permissions:
  contents: read
  pull-requests: write

jobs:
  terraform:
    runs-on: ubuntu-latest

    env:
      TF_TOKEN_app_terraform_io: ${{ secrets.TF_API_TOKEN }}

    steps:
      - name: checkout code
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v2
        with:
          terraform_version: 1.5.0

      - name: Terraform Init
        run: terraform init

      - name: Terraform Format Check
        run: terraform fmt -check

      - name: Terraform Validate
        run: terraform validate

      - name: Terraform Plan
        id: plan
        if: github.event_name == 'pull_request'
        run: |
          terraform plan -no-color > tfplan.txt 2>&1
          echo "plan_exit_code=$?" >> $GITHUB_OUTPUT
        continue-on-error: true

      - name: Read Plan Output
        id: read_plan
        if: github.event_name == 'pull_request'
        run: |
          content=$(cat tfplan.txt)
          echo "plan_output<<EOF" >> $GITHUB_OUTPUT
          echo "$content" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Terraform Plan Comment
        if: github.event_name == 'pull_request'
        uses: mshick/add-pr-comment@v2
        with:
         message: |
            ## Terraform Plan Summary
            
            <details>
            <summary><b>📝 Full Plan Output</b></summary>
            
            ```terraform
            ${{ steps.read_plan.outputs.plan_output }}
            ```
            
            </details>

      - name: Terraform Apply
        if: github.ref == 'refs/heads/main'
        run: terraform apply -auto-approve

      - name: Terraform App Deployment
        if: github.ref == 'refs/heads/main' && inputs.trigger_repo != ''
        uses: peter-evans/repository-dispatch@v4
        with:
          token: ${{ secrets.APP_REPO_PAT }}
          repository: ${{ inputs.trigger_repo }}
          event-type: infra-updated
          