name: Terraform Reusable Workflow

on:
  workflow_call:
    inputs:
      trigger_repo:
        required: false
        type: string
    secrets:
      TF_API_TOKEN:
        required: true
      APP_REPO_PAT:
        required: true
        
permissions:
  contents: read
  pull-requests: write

jobs:
  terraform:
    runs-on: ubuntu-latest

    env:
      TF_TOKEN_app_terraform_io: ${{ secrets.TF_API_TOKEN }}

    steps:
      - name: checkout code
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v2
        with:
          terraform_version: 1.5.0

      - name: Terraform Init
        run: terraform init

      - name: Terraform Format Check
        run: terraform fmt -check

      - name: Terraform Validate
        run: terraform validate

      - name: Terraform Plan
        id: plan
        if: github.event_name == 'pull_request'
        run: terraform plan -no-color | tee tfplan.out

      - name: Terraform Plan Comment
        if: github.event_name == 'pull_request'
        uses: borchero/terraform-plan-comment@v2
        with:
          token: ${{ secrets.GITHUB_TOKEN}}
          planfile: tfplan.out

      - name: Terraform Apply
        if: github.ref == 'refs/heads/main'
        run: terraform apply -auto-approve

      - name: Terraform App Deployment
        if: github.ref == 'refs/heads/main' && inputs.trigger_repo != ''
        uses: peter-evans/repository-dispatch@v4
        with:
          token: ${{ secrets.APP_REPO_PAT }}
          repository: ${{ inputs.trigger_repo }}
          event-type: infra-updated
          