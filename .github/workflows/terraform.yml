name: Terraform CI/CD

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read
  pull-requests: write

jobs:
  terraform:
    uses: ./.github/workflows/terraform-reusable.yml
    with:
      trigger_repo: bn-ritesh-chavan/cicd-app
    secrets:
      TF_API_TOKEN: ${{ secrets.TF_API_TOKEN }} 
      APP_REPO_PAT: ${{ secrets.APP_REPO_PAT }}
